# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default" # The available themes options are "default", "air", "sunrise", "mint", "dirt" and "contrast"
title                    : "Junteng Liu / Site Title"
title_separator          : "-"
name                     : &name "Junteng Liu"
description              : &description "Junteng Liu's academic portfolio"   # Update this with a general description of your site, this is the default if not overridden by a page
url                      : https://academicpages.github.io # The base hostname & protocol for your site e.g. "https://[your GitHub username].github.io",
                                                           # or if you already have some other page hosted on Github then use "https://[your GitHub username].github.io/[Your Repo Name]"
baseurl                  : "" # the subpath of your site, e.g. "/blog"
repository               : "academicpages/academicpages.github.io"

# Site Author - The following control what appear as part of the author content on the side bar.
#               If a field is blank the icon and link will not appear, otherwise it will be shown.
#               Additional customization can be done by editing /_includes/author-profile.html
author:
  # Biographic information
  avatar           : "profile.png"
  name             : "Junteng Liu"
  pronouns         : # example: "she/her"  
  bio              : "PhD candidate at HKUST NLP Group, focusing on NLP and machine learning"
  location         : "Hong Kong"
  employer         : "Hong Kong University of Science and Technology"
  uri              : # URL/Bio link for full author details
  email            : "jliugi@connect.ust.hk"

# Researcher (http://researcher.google.com) profile link
googlescholar    : "https://scholar.google.com/citations?hl=en&user=tbK9jl4AAAAJ&view_op=list_works&sortby=pubdate"

# Social/networking URLs
github           : "Vicent0205"
twitter          : "Vicent0205"
linkedin         : "Vicent0205"

# For specifying social profiles
# - https://developers.google.com/structured-data/customize/social-profiles
social:
  type                   : "Person"
  name                   : "Junteng Liu"
  links:
    - "https://github.com/Vicent0205"
    - "https://scholar.google.com/citations?hl=en&user=tbK9jl4AAAAJ&view_op=list_works&sortby=pubdate"

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see they are referenced by the site's templates.

# Collection settings
collections:
  publications:
    output: true
    sort_by: date
  talks:
    output: true
    sort_by: date
  teaching:
    output: true
    sort_by: date
  portfolio:
    output: true
    sort_by: date

# Conversion
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: single
      author_profile: true
      share: true
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true

# Build settings
markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"
show_excerpts: true

# Permalinks
permalink: /:categories/:title/

# Exclude from processing.
The following things will not be processed during the build.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# SEO Related
google_site_verification: ""
bing_site_verification: ""
avast_site_verification: ""
vk_site_verification: ""

# Social Sharing
twitter:
  username: "Vicent0205"
facebook:
  app_id: ""
  publisher: ""
  profile_id: ""

# Google Analytics
# google_analytics: ""

# Site Search
search: true

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from

# Gem dependencies
gem "minimal-mistakes-jekyll"

